<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Add New Customer')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">Add Customer</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/customers">Customer</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Add Customer</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Create New Customer</h4>
                    <p class="card-description">New customer </p>

                    <form class="forms-sample" th:action="@{/customers/add}" method="post">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" name="name" class="form-control" id="name" placeholder="Name" required th:value="${formEmployeeCode}">
                        </div>
                        <div class="form-group">
                            <label for="id_number">Identity Number</label>
                            <input type="number" name="id_number" class="form-control" id="id_number" placeholder="Identity Number" required th:value="${formFullName}">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="number" name="phone" class="form-control" id="phone" placeholder="Phone" required th:value="${formPhone}">
                        </div>
                        <div class="form-group">
                            <label>Note</label>
                            <textarea name="" id="" class="form-control"></textarea>
                        </div>
                        <button type="submit" class="btn btn-gradient-primary me-2">Add</button>
                        <a href="/customers" class="btn btn-light">Cancel</a>
                    </form>
                  </div>
                </div>
              </div>
        </div>
    </section>
</html>
