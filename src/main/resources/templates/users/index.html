<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'User List')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">List User</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/users">User</a></li>
                    <li class="breadcrumb-item active" aria-current="page">List User</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <div style="display: flex; justify-content: space-between;">
                      <h4 class="card-title">User Table List</h4>
                      <a href="/users/add" class="btn btn-gradient-primary btn-fw"><i class="mdi mdi-plus-thick"></i>Add User</a>
                    </div>
                    <table class="table">
                      <thead>
                        <tr>
                          <th>Profile</th>
                          <th>Username</th>
                          <th>Role</th>
                          <th>Created At</th>
                          <th>Status</th>
                          <th>Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr th:each="u : ${users}">
                            <td>
                                <img th:if="${u.image != null and !#strings.isEmpty(u.image)}"
                                     th:src="@{${u.image}}"
                                     alt="profile"
                                     style="width:50px;height:50px;object-fit:cover;border-radius:50%;">
                            </td>
                            <td th:text="${u.username}"></td>
                            <td th:text="${u.role}"></td>
                            <td th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'dd MMM yyyy HH:mm') : ''}"></td>
                            <td>
                                <label class="badge"
                                    th:classappend="${u.active ? ' badge-success' : ' badge-danger'}"
                                    th:text="${u.active ? 'Active' : 'Inactive'}"></label>
                            </td>
                            <td>
                              <a th:href="@{/users/edit/{id}(id=${u.id})}" class="btn btn-gradient-warning btn-xs"><i class="mdi mdi-pencil"></i></a>
                              <a th:href="@{/users/delete/{id}(id=${u.id})}" class="btn btn-gradient-danger btn-xs" onclick="return confirm('Are you sure you want to delete this user?');"><i class="mdi mdi-delete"></i></a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="5" class="text-center">No users found.</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
        </div>
    </section>
</html>
