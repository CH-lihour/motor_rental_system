<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Add New Motorcycle')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">Add Motorcycle</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/motorcycles">Motorcycle</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Add Motorcycle</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Create New Motorcycle</h4>
                        <p class="card-description">New motorcycle</p>

                        <form class="forms-sample" th:action="@{/motorcycles/add}" method="post">
                            <div class="form-group">
                                <label for="plate_number">Plate Number</label>
                                <input type="text" name="plate_number" class="form-control" id="plate_number" placeholder="Plate Number" required>
                            </div>
                            <div class="form-group">
                                <label for="model">Model</label>
                                <input type="text" name="model" class="form-control" id="model" placeholder="Model" required>
                            </div>
                            <div class="form-group">
                                <label for="type">Type</label>
                                <select class="form-select" name="type" id="type" required>
                                    <option value="">-- Select Type --</option>
                                    <option th:each="t : ${types}" th:value="${t.name()}" th:text="${t.name()}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="engine_cc">Engine CC</label>
                                <input type="number" name="engine_cc" class="form-control" id="engine_cc" placeholder="Engine CC">
                            </div>
                            <div class="form-group">
                                <label for="daily_price">Daily Price</label>
                                <input type="number" step="0.01" name="daily_price" class="form-control" id="daily_price" placeholder="Daily Price" required>
                            </div>
                            <div class="form-group">
                                <label for="status">Status</label>
                                <select class="form-select" name="status" id="status" required>
                                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}" th:selected="${s.name() == 'AVAILABLE'}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="note">Note</label>
                                <textarea name="note" id="note" class="form-control"></textarea>
                            </div>
                            <button type="submit" class="btn btn-gradient-primary me-2">Add</button>
                            <a href="/motorcycles" class="btn btn-light">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
