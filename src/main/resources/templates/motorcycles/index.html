<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Motorcycle List')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">List Motorcycle</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/motorcycles">Motorcycle</a></li>
                    <li class="breadcrumb-item active" aria-current="page">List Motorcycle</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <div style="display: flex; justify-content: space-between;">
                            <h4 class="card-title">Motorcycle Table List</h4>
                            <a href="/motorcycles/add" class="btn btn-gradient-primary btn-fw"><i class="mdi mdi-plus-thick"></i>Add Motorcycle</a>
                        </div>
                        <table class="table">
                            <thead>
                            <tr>
                                <th>No</th>
                                <th>Plate Number</th>
                                <th>Model</th>
                                <th>Type</th>
                                <th>Engine CC</th>
                                <th>Daily Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="m, stat : ${motorcycles}">
                                <td th:text="${stat.count}"></td>
                                <td th:text="${m.plateNumber}"></td>
                                <td th:text="${m.model}"></td>
                                <td th:text="${m.type}"></td>
                                <td th:text="${m.engineCc}"></td>
                                <td th:text="${m.dailyPrice}"></td>
                                <td th:text="${m.status}"></td>
                                <td>
                                    <a th:href="@{/motorcycles/edit/{id}(id=${m.id})}" class="btn btn-gradient-warning btn-xs"><i class="mdi mdi-pencil"></i></a>
                                    <a th:href="@{/motorcycles/delete/{id}(id=${m.id})}" class="btn btn-gradient-danger btn-xs" onclick="return confirm('Are you sure you want to delete this motorcycle?');"><i class="mdi mdi-delete"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(motorcycles)}">
                                <td colspan="8" class="text-center">No motorcycles found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
