<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Return List')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">List Return</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/returns">Return</a></li>
                    <li class="breadcrumb-item active" aria-current="page">List Return</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <div style="display: flex; justify-content: space-between;">
                            <h4 class="card-title">Return Table List</h4>
                            <a href="/returns/add" class="btn btn-gradient-primary btn-fw"><i class="mdi mdi-plus-thick"></i>Add Return</a>
                        </div>
                        <table class="table">
                            <thead>
                            <tr>
                                <th>No</th>
                                <th>Booking ID</th>
                                <th>Handled By</th>
                                <th>Return Time</th>
                                <th>Late Fee</th>
                                <th>Damage Fee</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="r, stat : ${returns}">
                                <td th:text="${stat.count}"></td>
                                <td th:text="${r.booking != null ? r.booking.id : ''}"></td>
                                <td th:text="${r.handledBy != null ? r.handledBy.fullName : ''}"></td>
                                <td th:text="${r.returnTime != null ? #temporals.format(r.returnTime, 'dd MMM yyyy HH:mm') : ''}"></td>
                                <td th:text="${r.lateFee}"></td>
                                <td th:text="${r.damageFee}"></td>
                                <td>
                                    <a th:href="@{/returns/edit/{id}(id=${r.id})}" class="btn btn-gradient-warning btn-xs"><i class="mdi mdi-pencil"></i></a>
                                    <a th:href="@{/returns/delete/{id}(id=${r.id})}" class="btn btn-gradient-danger btn-xs" onclick="return confirm('Are you sure you want to delete this return record?');"><i class="mdi mdi-delete"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(returns)}">
                                <td colspan="7" class="text-center">No returns found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
