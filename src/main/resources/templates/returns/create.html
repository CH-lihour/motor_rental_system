<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Add New Return')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">Add Return</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/returns">Return</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Add Return</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Create New Return</h4>
                        <p class="card-description">New return</p>

                        <form class="forms-sample" th:action="@{/returns/add}" method="post">
                            <div class="form-group">
                                <label for="booking_id">Booking</label>
                                <select class="form-select" name="booking_id" id="booking_id" required>
                                    <option value="">-- Select Booking --</option>
                                    <option th:each="b : ${bookings}" th:value="${b.id}" th:text="${'Booking #' + b.id + ' - ' + (b.customer != null ? b.customer.name : '')}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="handled_by">Handled By</label>
                                <select class="form-select" name="handled_by" id="handled_by" required>
                                    <option value="">-- Select Employee --</option>
                                    <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.fullName}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="return_time">Return Time</label>
                                <input type="datetime-local" name="return_time" class="form-control" id="return_time" required>
                            </div>
                            <div class="form-group">
                                <label for="late_fee">Late Fee</label>
                                <input type="number" step="0.01" name="late_fee" class="form-control" id="late_fee" value="0">
                            </div>
                            <div class="form-group">
                                <label for="damage_fee">Damage Fee</label>
                                <input type="number" step="0.01" name="damage_fee" class="form-control" id="damage_fee" value="0">
                            </div>
                            <div class="form-group">
                                <label for="note">Note</label>
                                <textarea name="note" id="note" class="form-control"></textarea>
                            </div>
                            <button type="submit" class="btn btn-gradient-primary me-2">Add</button>
                            <a href="/returns" class="btn btn-light">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
