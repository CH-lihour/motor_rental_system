<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Employee List')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">List Employee</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/employees">Employee</a></li>
                    <li class="breadcrumb-item active" aria-current="page">List Employee</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <div style="display: flex; justify-content: space-between;">
                      <h4 class="card-title">Employee Table List</h4>
                      <a href="/employees/add" class="btn btn-gradient-primary btn-fw"><i class="mdi mdi-plus-thick"></i>Add Employee</a>
                    </div>
                    <table class="table">
                      <thead>
                        <tr>
                          <th>No</th>
                          <th>Employee Code</th>
                          <th>Fullname</th>
                          <th>Position</th>
                          <th>Phone Number</th>
                          <th>Status</th>
                          <th>Created At</th>
                          <th>Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr th:each="e, stat : ${employees}">
                          <td th:text="${stat.count}"></td>
                          <td th:text="${e.employeeCode}"></td>
                          <td th:text="${e.fullName}"></td>
                          <td th:text="${e.position}"></td>
                          <td th:text="${e.phone}"></td>
                          <td>
                              <label class="badge"
                                  th:classappend="${e.status != null and e.status.name() == 'ACTIVE' ? ' badge-success' : ' badge-danger'}"
                                  th:text="${e.status != null and e.status.name() == 'ACTIVE' ? 'Active' : 'Inactive'}"></label>
                          </td>
                          <td th:text="${e.createdAt != null ? #temporals.format(e.createdAt, 'dd MMM yyyy HH:mm') : ''}"></td>
                          <td>
                            <a th:href="@{/employees/edit/{id}(id=${e.id})}" class="btn btn-gradient-warning btn-xs"><i class="mdi mdi-pencil"></i></a>
                            <a th:href="@{/employees/delete/{id}(id=${e.id})}" class="btn btn-gradient-danger btn-xs" onclick="return confirm('Are you sure you want to delete this employee?');"><i class="mdi mdi-delete"></i></a>
                          </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(employees)}">
                            <td colspan="8" class="text-center">No employees found.</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
        </div>
    </section>
</html>
