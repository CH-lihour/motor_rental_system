<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Payment List')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">List Payment</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/payments">Payment</a></li>
                    <li class="breadcrumb-item active" aria-current="page">List Payment</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <div style="display: flex; justify-content: space-between;">
                            <h4 class="card-title">Payment Table List</h4>
                            <a href="/payments/add" class="btn btn-gradient-primary btn-fw"><i class="mdi mdi-plus-thick"></i>Add Payment</a>
                        </div>
                        <table class="table">
                            <thead>
                            <tr>
                                <th>No</th>
                                <th>Booking ID</th>
                                <th>Amount</th>
                                <th>Type</th>
                                <th>Method</th>
                                <th>Status</th>
                                <th>Created At</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p, stat : ${payments}">
                                <td th:text="${stat.count}"></td>
                                <td th:text="${p.booking != null ? p.booking.id : ''}"></td>
                                <td th:text="${p.amount}"></td>
                                <td th:text="${p.paymentType}"></td>
                                <td th:text="${p.method}"></td>
                                <td th:text="${p.status}"></td>
                                <td th:text="${p.createdAt != null ? #temporals.format(p.createdAt, 'dd MMM yyyy HH:mm') : ''}"></td>
                                <td>
                                    <a th:href="@{/payments/edit/{id}(id=${p.id})}" class="btn btn-gradient-warning btn-xs"><i class="mdi mdi-pencil"></i></a>
                                    <a th:href="@{/payments/delete/{id}(id=${p.id})}" class="btn btn-gradient-danger btn-xs" onclick="return confirm('Are you sure you want to delete this payment?');"><i class="mdi mdi-delete"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(payments)}">
                                <td colspan="8" class="text-center">No payments found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
