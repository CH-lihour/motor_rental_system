<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Update Payment')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">Update Payment</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/payments">Payment</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Update Payment</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Update Payment</h4>
                        <p class="card-description">Update payment</p>

                        <form class="forms-sample" th:action="@{/payments/edit/{id}(id=${payment.id})}" method="post">
                            <div class="form-group">
                                <label for="booking_id">Booking</label>
                                <select class="form-select" name="booking_id" id="booking_id" required>
                                    <option th:each="b : ${bookings}" th:value="${b.id}" th:text="${'Booking #' + b.id + ' - ' + (b.customer != null ? b.customer.name : '')}" th:selected="${payment.booking != null and payment.booking.id == b.id}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="amount">Amount</label>
                                <input type="number" step="0.01" name="amount" class="form-control" id="amount" placeholder="Amount" required th:value="${payment.amount}">
                            </div>
                            <div class="form-group">
                                <label for="payment_type">Payment Type</label>
                                <select class="form-select" name="payment_type" id="payment_type" required>
                                    <option th:each="t : ${types}" th:value="${t.name()}" th:text="${t.name()}" th:selected="${payment.paymentType != null and payment.paymentType.name() == t.name()}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="method">Method</label>
                                <select class="form-select" name="method" id="method" required>
                                    <option th:each="m : ${methods}" th:value="${m.name()}" th:text="${m.name()}" th:selected="${payment.method != null and payment.method.name() == m.name()}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="status">Status</label>
                                <select class="form-select" name="status" id="status" required>
                                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}" th:selected="${payment.status != null and payment.status.name() == s.name()}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-gradient-primary me-2">Update</button>
                            <a href="/payments" class="btn btn-light">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
