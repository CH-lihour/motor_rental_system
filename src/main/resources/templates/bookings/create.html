<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Add New Booking')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">Add Booking</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/bookings">Booking</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Add Booking</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Create New Booking</h4>
                        <p class="card-description">New booking</p>

                        <form class="forms-sample" th:action="@{/bookings/add}" method="post">
                            <div class="form-group">
                                <label for="customer_id">Customer</label>
                                <select class="form-select" name="customer_id" id="customer_id" required>
                                    <option value="">-- Select Customer --</option>
                                    <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.name + ' (' + c.phone + ')'}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="motorcycle_id">Motorcycle</label>
                                <select class="form-select" name="motorcycle_id" id="motorcycle_id" required>
                                    <option value="">-- Select Motorcycle --</option>
                                    <option th:each="m : ${motorcycles}" th:value="${m.id}" th:text="${m.plateNumber + ' - ' + m.model}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="handled_by">Handled By</label>
                                <select class="form-select" name="handled_by" id="handled_by" required>
                                    <option value="">-- Select Employee --</option>
                                    <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.fullName}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="start_time">Start Time</label>
                                <input type="datetime-local" name="start_time" class="form-control" id="start_time" required>
                            </div>
                            <div class="form-group">
                                <label for="end_time">End Time</label>
                                <input type="datetime-local" name="end_time" class="form-control" id="end_time" required>
                            </div>
                            <div class="form-group">
                                <label for="daily_price">Daily Price (optional)</label>
                                <input type="number" step="0.01" name="daily_price" class="form-control" id="daily_price" placeholder="Leave blank to use motorcycle price">
                            </div>
                            <div class="form-group">
                                <label for="deposit">Deposit</label>
                                <input type="number" step="0.01" name="deposit" class="form-control" id="deposit" value="0">
                            </div>
                            <div class="form-group">
                                <label for="status">Status</label>
                                <select class="form-select" name="status" id="status" required>
                                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}" th:selected="${s.name() == 'RESERVED'}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-gradient-primary me-2">Add</button>
                            <a href="/bookings" class="btn btn-light">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
