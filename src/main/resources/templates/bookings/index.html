<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Booking List')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">List Booking</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/bookings">Booking</a></li>
                    <li class="breadcrumb-item active" aria-current="page">List Booking</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <div style="display: flex; justify-content: space-between;">
                            <h4 class="card-title">Booking Table List</h4>
                            <a href="/bookings/add" class="btn btn-gradient-primary btn-fw"><i class="mdi mdi-plus-thick"></i>Add Booking</a>
                        </div>
                        <table class="table">
                            <thead>
                            <tr>
                                <th>No</th>
                                <th>Customer</th>
                                <th>Motorcycle</th>
                                <th>Handled By</th>
                                <th>Start Time</th>
                                <th>End Time</th>
                                <th>Total Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="b, stat : ${bookings}">
                                <td th:text="${stat.count}"></td>
                                <td th:text="${b.customer != null ? b.customer.name : ''}"></td>
                                <td th:text="${b.motorcycle != null ? b.motorcycle.plateNumber : ''}"></td>
                                <td th:text="${b.handledBy != null ? b.handledBy.fullName : ''}"></td>
                                <td th:text="${b.startTime != null ? #temporals.format(b.startTime, 'dd MMM yyyy HH:mm') : ''}"></td>
                                <td th:text="${b.endTime != null ? #temporals.format(b.endTime, 'dd MMM yyyy HH:mm') : ''}"></td>
                                <td th:text="${b.totalPrice}"></td>
                                <td th:text="${b.status}"></td>
                                <td>
                                    <a th:href="@{/bookings/edit/{id}(id=${b.id})}" class="btn btn-gradient-warning btn-xs"><i class="mdi mdi-pencil"></i></a>
                                    <a th:href="@{/bookings/delete/{id}(id=${b.id})}" class="btn btn-gradient-danger btn-xs" onclick="return confirm('Are you sure you want to delete this booking?');"><i class="mdi mdi-delete"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(bookings)}">
                                <td colspan="9" class="text-center">No bookings found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
