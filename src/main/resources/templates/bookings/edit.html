<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/sidebar :: layout(~{::section}, 'Update Booking')}">
    <section>
        <div class="page-header">
            <h3 class="page-title">Update Booking</h3>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/bookings">Booking</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Update Booking</li>
                </ol>
            </nav>
        </div>

        <div class="row">
            <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Update Booking</h4>
                        <p class="card-description">Update booking</p>

                        <form class="forms-sample" th:action="@{/bookings/edit/{id}(id=${booking.id})}" method="post">
                            <div class="form-group">
                                <label for="customer_id">Customer</label>
                                <select class="form-select" name="customer_id" id="customer_id" required>
                                    <option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.name + ' (' + c.phone + ')'}" th:selected="${booking.customer != null and booking.customer.id == c.id}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="motorcycle_id">Motorcycle</label>
                                <select class="form-select" name="motorcycle_id" id="motorcycle_id" required>
                                    <option th:each="m : ${motorcycles}" th:value="${m.id}" th:text="${m.plateNumber + ' - ' + m.model}" th:selected="${booking.motorcycle != null and booking.motorcycle.id == m.id}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="handled_by">Handled By</label>
                                <select class="form-select" name="handled_by" id="handled_by" required>
                                    <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.fullName}" th:selected="${booking.handledBy != null and booking.handledBy.id == e.id}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="start_time">Start Time</label>
                                <input type="datetime-local" name="start_time" class="form-control" id="start_time" required th:value="${booking.startTime != null ? #temporals.format(booking.startTime, 'yyyy-MM-dd''T''HH:mm') : ''}">
                            </div>
                            <div class="form-group">
                                <label for="end_time">End Time</label>
                                <input type="datetime-local" name="end_time" class="form-control" id="end_time" required th:value="${booking.endTime != null ? #temporals.format(booking.endTime, 'yyyy-MM-dd''T''HH:mm') : ''}">
                            </div>
                            <div class="form-group">
                                <label for="daily_price">Daily Price</label>
                                <input type="number" step="0.01" name="daily_price" class="form-control" id="daily_price" required th:value="${booking.dailyPrice}">
                            </div>
                            <div class="form-group">
                                <label for="deposit">Deposit</label>
                                <input type="number" step="0.01" name="deposit" class="form-control" id="deposit" th:value="${booking.deposit}">
                            </div>
                            <div class="form-group">
                                <label for="status">Status</label>
                                <select class="form-select" name="status" id="status" required>
                                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}" th:selected="${booking.status != null and booking.status.name() == s.name()}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-gradient-primary me-2">Update</button>
                            <a href="/bookings" class="btn btn-light">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</html>
